```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Terminal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="terminal-header">
        <div class="terminal-dot dot-close"></div>
        <div class="terminal-dot dot-minimize"></div>
        <div class="terminal-dot dot-maximize"></div>
        <div class="terminal-title">AI Terminal</div>
        <button class="settings-btn" onclick="openSettings()">⚙ Settings</button>
    </div>
    <div class="terminal-body" id="terminalBody">
        <div class="message">
            <div class="message-prefix system-prefix">SYSTEM:</div>
            <div class="message-content">Welcome to the AI Terminal!</div>
        </div>
        <div class="loading-animation" id="loadingAnimation"></div>
    </div>
    <div class="input-container">
        <span class="prompt-symbol">></span>
        <input type="text" id="userInput" placeholder="Enter your message...">
        <button id="sendButton" onclick="sendMessage()">SEND</button>
        <button id="clearConversationButton" onclick="clearConversation()">CLEAR</button>
    </div>
    <div class="settings-menu" id="settingsMenu">
        <h2>Settings</h2>
        <ul>
            <li><a href="#" onclick="toggleDarkMode()">Dark Mode</a></li>
            <li><a href="#" onclick="toggleLanguage()">Language</a></li>
        </ul>
    </div>
    <div class="modal" id="apiKeyModal">
        <div class="modal-content">
            <div class="modal-title">Configure Groq API Key</div>
            <input type="password" id="apiKeyInput" class="modal-input" placeholder="Enter your Groq API key (gsk_...)">
            <div class="modal-buttons">
                <button class="modal-button modal-button-secondary" onclick="closeSettings()">Cancel</button>
                <button class="modal-button modal-button-primary" onclick="saveApiKey()">Save</button>
            </div>
        </div>
    </div>
    <script>
        let conversationHistory = [];

        // Check for API key on load
        window.addEventListener('load', () => {
            const apiKey = localStorage.getItem('groq_api_key');
            if (!apiKey) {
                openSettings();
            }

            // Focus input
            document.getElementById('userInput').focus();

            // Enter to send
            document.getElementById('userInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });

        function openSettings() {
            const modal = document.getElementById('apiKeyModal');
            const input = document.getElementById('apiKeyInput');
            const savedKey = localStorage.getItem('groq_api_key');

            if (savedKey) {
                input.value = savedKey;
            }

            modal.classList.add('active');
            input.focus();
        }

        function closeSettings() {
            const modal = document.getElementById('apiKeyModal');
            modal.classList.remove('active');
        }

        function saveApiKey() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();

            if (!apiKey) {
                addMessage('ERROR: API key cannot be empty', 'error');
                return;
            }

            if (!apiKey.startsWith('gsk_')) {
                addMessage('WARNING: API key should start with "gsk_"', 'error');
            }

            localStorage.setItem('groq_api_key', apiKey);
            closeSettings();
            addMessage('API key saved successfully', 'system');
        }

        function addMessage(content, type = 'user') {
            const terminalBody = document.getElementById('terminalBody');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';

            const prefix = document.createElement('div');
            prefix.className = 'message-prefix';

            switch (type) {
                case 'user':
                    prefix.className += ' user-prefix';
                    prefix.textContent = 'USER:';
                    break;
                case 'assistant':
                    prefix.className += ' assistant-prefix';
                    prefix.textContent = 'AI:';
                    break;
                case 'system':
                    prefix.className += ' system-prefix';
                    prefix.textContent = 'SYSTEM:';
                    break;
                case 'error':
                    prefix.className += ' error-prefix';
                    prefix.textContent = 'ERROR:';
                    break;
            }

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            messageDiv.appendChild(prefix);
            messageDiv.appendChild(contentDiv);
            terminalBody.appendChild(messageDiv);

            // Scroll to bottom
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const sendButton = document.getElementById('sendButton');
            const message = input.value.trim();

            if (!message) return;

            const apiKey = localStorage.getItem('groq_api_key');
            if (!apiKey) {
                addMessage('Please configure your API key first', 'error');
                openSettings();
                return;
            }

            // Add user message
            addMessage(message, 'user');
            conversationHistory.push({
                role: 'user',
                content: message
            });

            // Clear input and disable
            input.value = '';
            input.disabled = true;
            sendButton.disabled = true;

            // Show typing indicator
            const typingIndicator = document.getElementById('typingIndicator');
            typingIndicator.classList.add('active');

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: conversationHistory,
                        temperature: 0.7,
                        max_tokens: 2048
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'API request failed');
                }

                const data = await response.json();
                const aiMessage = data.choices[0].message.content;

                // Add AI response
                addMessage(aiMessage, 'assistant');
                conversationHistory.push({
                    role: 'assistant',
                    content: aiMessage
                });
            } catch (error) {
                addMessage(`Failed to get response: ${error.message}`, 'error');
                console.error('Error:', error);
            } finally {
                // Hide typing indicator
                typingIndicator.classList.remove('active');

                // Re-enable input
                input.disabled = false;
                sendButton.disabled = false;
                input.focus();
            }
        }

        function clearConversation() {
            const terminalBody = document.getElementById('terminalBody');
            terminalBody.innerHTML = '';
            conversationHistory = [];
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        function toggleLanguage() {
            // TO DO: implement language toggle
        }
    </script>
    <style>
        /* Add styles for the loading animation */
        .loading-animation {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }

        .loading-animation.active {
            display: block;
        }
    </style>
</body>
</html>
