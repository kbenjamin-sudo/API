<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SILENT CALIBER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050505;
            color: #22c55e;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            user-select: none;
        }

        #game-canvas {
            filter: contrast(1.2) brightness(0.9) saturate(0.5);
        }

        .crt-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.9) 120%);
            pointer-events: none;
            z-index: 90;
        }

        .hud-scanline {
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            from { transform: translateY(-100%); }
            to { transform: translateY(100%); }
        }

        .muzzle-flash {
            position: fixed;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 80;
        }
    </style>
</head>
<body>

    <div class="crt-overlay"></div>
    <div class="vignette"></div>
    <div id="flash" class="muzzle-flash"></div>

    <div class="fixed top-8 left-8 z-[110] opacity-60">
        <div class="text-[10px] tracking-[0.4em] uppercase mb-2">System Status: Active</div>
        <div class="h-[2px] w-32 bg-white/10 relative overflow-hidden">
            <div id="health-bar" class="h-full bg-green-500 w-full transition-all duration-500"></div>
            <div class="hud-scanline absolute inset-0 bg-white/20 w-full h-[1px]"></div>
        </div>
    </div>

    <div class="fixed bottom-8 right-8 z-[110] text-right">
        <div id="weapon-name" class="text-xl font-black italic uppercase tracking-tighter text-white/80">M16A4</div>
        <div class="flex justify-end gap-1 mt-2" id="ammo-pips">
            </div>
        <div class="text-[10px] mt-2 text-white/30 uppercase tracking-widest">Caliber: 5.56x45mm</div>
    </div>

    <div class="fixed bottom-8 left-8 z-[110] opacity-40 text-[10px]">
        [1] M16A4 - BURST<br>
        [2] FIVE-SEVEN - SEMI<br>
        [R] RELOAD<br>
        [CLICK] FIRE
    </div>

    <canvas id="game-canvas"></canvas>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const flashEl = document.getElementById('flash');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let weaponX = 0, weaponY = 0;
        
        // Game State
        const state = {
            weapon: 'M16A4',
            ammo: { 'M16A4': 30, 'Five-seveN': 20 },
            maxAmmo: { 'M16A4': 30, 'Five-seveN': 20 },
            isFiring: false,
            lastFire: 0
        };

        function init() {
            resize();
            createForest();
            renderAmmo();
            loop();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            weaponX = width / 2;
            weaponY = height / 2;
        }

        const trees = [];
        function createForest() {
            for(let i=0; i<60; i++) {
                trees.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 100 + 50,
                    opacity: Math.random() * 0.5 + 0.1
                });
            }
        }

        function renderAmmo() {
            const container = document.getElementById('ammo-pips');
            container.innerHTML = '';
            const count = state.ammo[state.weapon];
            for(let i=0; i < count; i++) {
                const pip = document.createElement('div');
                pip.className = 'w-[3px] h-4 bg-green-500/60 shadow-[0_0_8px_rgba(34,197,94,0.4)]';
                container.appendChild(pip);
            }
        }

        function fire() {
            const now = Date.now();
            if (state.ammo[state.weapon] <= 0) return;

            if (state.weapon === 'M16A4') {
                if (now - state.lastFire < 600) return; // Burst delay
                state.lastFire = now;
                
                // 3 Round Burst Logic
                for(let i=0; i<3; i++) {
                    setTimeout(() => {
                        if(state.ammo['M16A4'] > 0) {
                            state.ammo['M16A4']--;
                            triggerEffects(15);
                            renderAmmo();
                        }
                    }, i * 80);
                }
            } else {
                if (now - state.lastFire < 150) return;
                state.lastFire = now;
                state.ammo['Five-seveN']--;
                triggerEffects(8);
                renderAmmo();
            }
        }

        function triggerEffects(recoil) {
            weaponY += recoil; // Mechanical Kick
            flashEl.style.opacity = '0.3';
            setTimeout(() => flashEl.style.opacity = '0', 40);
            
            // Screen shake
            canvas.style.transform = `translate(${(Math.random()-0.5)*10}px, ${(Math.random()-0.5)*10}px)`;
            setTimeout(() => canvas.style.transform = 'translate(0,0)', 50);
        }

        function loop() {
            // Draw Background
            ctx.fillStyle = '#050605';
            ctx.fillRect(0, 0, width, height);

            // Interpolate Weapon Position (Inertia)
            weaponX += (mouseX - weaponX) * 0.08;
            weaponY += (mouseY - weaponY) * 0.08;

            // Draw Forest (Simple atmospheric shapes)
            trees.forEach(tree => {
                ctx.fillStyle = `rgba(10, 20, 10, ${tree.opacity})`;
                ctx.fillRect(tree.x - (weaponX*0.05), tree.y - (weaponY*0.05), tree.size/4, tree.size);
            });

            // Draw Weapon Silhouette
            ctx.save();
            ctx.translate(weaponX, weaponY);
            
            // The Gun "Shadow"
            ctx.fillStyle = '#0a0a0a';
            if (state.weapon === 'M16A4') {
                ctx.fillRect(20, 40, 300, 40); // Barrel
                ctx.fillRect(0, 20, 100, 80);  // Body
            } else {
                ctx.fillRect(10, 20, 120, 35); // Five-seven slide
                ctx.fillRect(10, 20, 40, 90);  // Grip
            }
            
            // Iron Sights / Laser
            ctx.fillStyle = 'rgba(255, 0, 0, 0.2)';
            ctx.beginPath();
            ctx.arc(0, 0, 2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();

            requestAnimationFrame(loop);
        }

        // Listeners
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        window.addEventListener('mousedown', fire);

        window.addEventListener('keydown', (e) => {
            if (e.key === '1') {
                state.weapon = 'M16A4';
                document.getElementById('weapon-name').innerText = 'M16A4';
                renderAmmo();
            }
            if (e.key === '2') {
                state.weapon = 'Five-seveN';
                document.getElementById('weapon-name').innerText = 'Five-seveN';
                renderAmmo();
            }
            if (e.key.toLowerCase() === 'r') {
                state.ammo[state.weapon] = state.maxAmmo[state.weapon];
                renderAmmo();
            }
        });

        window.addEventListener('resize', resize);
        init();
    </script>
</body>
</html>
