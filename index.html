<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: #0a0e14;
            color: #b8bb26;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            background: #16191f;
            padding: 8px 16px;
            border-bottom: 1px solid #282c34;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot-close { background: #fb4934; }
        .dot-minimize { background: #fabd2f; }
        .dot-maximize { background: #b8bb26; }

        .terminal-title {
            margin-left: 12px;
            color: #83a598;
            font-size: 13px;
        }

        .terminal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .terminal-body::-webkit-scrollbar {
            width: 8px;
        }

        .terminal-body::-webkit-scrollbar-track {
            background: #0a0e14;
        }

        .terminal-body::-webkit-scrollbar-thumb {
            background: #282c34;
            border-radius: 4px;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 4px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-prefix {
            font-weight: bold;
            font-size: 13px;
        }

        .user-prefix {
            color: #83a598;
        }

        .assistant-prefix {
            color: #b8bb26;
        }

        .system-prefix {
            color: #fabd2f;
        }

        .error-prefix {
            color: #fb4934;
        }

        .message-content {
            color: #ebdbb2;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding-left: 16px;
        }

        .input-container {
            background: #16191f;
            border-top: 1px solid #282c34;
            padding: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .prompt-symbol {
            color: #b8bb26;
            font-weight: bold;
            font-size: 16px;
        }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ebdbb2;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            padding: 8px 0;
        }

        #userInput::placeholder {
            color: #504945;
        }

        #sendButton {
            background: #b8bb26;
            color: #0a0e14;
            border: none;
            padding: 8px 16px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        #sendButton:hover {
            background: #98971a;
        }

        #sendButton:disabled {
            background: #504945;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #16191f;
            border: 1px solid #282c34;
            border-radius: 8px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
        }

        .modal-title {
            color: #b8bb26;
            font-size: 18px;
            margin-bottom: 16px;
        }

        .modal-input {
            width: 100%;
            background: #0a0e14;
            border: 1px solid #282c34;
            color: #ebdbb2;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            border-radius: 4px;
            margin-bottom: 16px;
        }

        .modal-input:focus {
            outline: none;
            border-color: #b8bb26;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-button {
            padding: 8px 16px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-button-primary {
            background: #b8bb26;
            color: #0a0e14;
        }

        .modal-button-primary:hover {
            background: #98971a;
        }

        .modal-button-secondary {
            background: #504945;
            color: #ebdbb2;
        }

        .modal-button-secondary:hover {
            background: #3c3836;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 4px;
            color: #b8bb26;
            font-size: 13px;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #b8bb26;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        .settings-btn {
            background: transparent;
            border: 1px solid #504945;
            color: #83a598;
            padding: 6px 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            margin-left: auto;
            transition: all 0.2s;
        }

        .settings-btn:hover {
            border-color: #83a598;
            background: rgba(131, 165, 152, 0.1);
        }
    </style>
</head>
<body>
    <div class="terminal-header">
        <div class="terminal-dot dot-close"></div>
        <div class="terminal-dot dot-minimize"></div>
        <div class="terminal-dot dot-maximize"></div>
        <div class="terminal-title">groq-terminal v1.0</div>
        <button class="settings-btn" onclick="openSettings()">⚙ Settings</button>
    </div>

    <div class="terminal-body" id="terminalBody">
        <div class="message">
            <div class="message-prefix system-prefix">SYSTEM:</div>
            <div class="message-content">Terminal initialized. Type your message to start chatting.</div>
        </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
        <span style="margin-right: 4px;">AI:</span>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
    </div>

    <div class="input-container">
        <span class="prompt-symbol">></span>
        <input type="text" id="userInput" placeholder="Enter your message..." autocomplete="off">
        <button id="sendButton" onclick="sendMessage()">SEND</button>
    </div>

    <div class="modal" id="apiKeyModal">
        <div class="modal-content">
            <div class="modal-title">Configure Groq API Key</div>
            <input type="password" id="apiKeyInput" class="modal-input" placeholder="Enter your Groq API key (gsk_...)">
            <div class="modal-buttons">
                <button class="modal-button modal-button-secondary" onclick="closeSettings()">Cancel</button>
                <button class="modal-button modal-button-primary" onclick="saveApiKey()">Save</button>
            </div>
        </div>
    </div>

    <script>
        let conversationHistory = [];

        // Check for API key on load
        window.addEventListener('load', () => {
            const apiKey = localStorage.getItem('groq_api_key');
            if (!apiKey) {
                openSettings();
            }

            // Focus input
            document.getElementById('userInput').focus();

            // Enter to send
            document.getElementById('userInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });

        function openSettings() {
            const modal = document.getElementById('apiKeyModal');
            const input = document.getElementById('apiKeyInput');
            const savedKey = localStorage.getItem('groq_api_key');
            
            if (savedKey) {
                input.value = savedKey;
            }
            
            modal.classList.add('active');
            input.focus();
        }

        function closeSettings() {
            const modal = document.getElementById('apiKeyModal');
            modal.classList.remove('active');
        }

        function saveApiKey() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            
            if (!apiKey) {
                addMessage('ERROR: API key cannot be empty', 'error');
                return;
            }

            if (!apiKey.startsWith('gsk_')) {
                addMessage('WARNING: API key should start with "gsk_"', 'error');
            }

            localStorage.setItem('groq_api_key', apiKey);
            closeSettings();
            addMessage('API key saved successfully', 'system');
        }

        function addMessage(content, type = 'user') {
            const terminalBody = document.getElementById('terminalBody');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';

            const prefix = document.createElement('div');
            prefix.className = 'message-prefix';
            
            switch(type) {
                case 'user':
                    prefix.className += ' user-prefix';
                    prefix.textContent = 'USER:';
                    break;
                case 'assistant':
                    prefix.className += ' assistant-prefix';
                    prefix.textContent = 'AI:';
                    break;
                case 'system':
                    prefix.className += ' system-prefix';
                    prefix.textContent = 'SYSTEM:';
                    break;
                case 'error':
                    prefix.className += ' error-prefix';
                    prefix.textContent = 'ERROR:';
                    break;
            }

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            messageDiv.appendChild(prefix);
            messageDiv.appendChild(contentDiv);
            terminalBody.appendChild(messageDiv);

            // Scroll to bottom
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const sendButton = document.getElementById('sendButton');
            const message = input.value.trim();

            if (!message) return;

            const apiKey = localStorage.getItem('groq_api_key');
            if (!apiKey) {
                addMessage('Please configure your API key first', 'error');
                openSettings();
                return;
            }

            // Add user message
            addMessage(message, 'user');
            conversationHistory.push({
                role: 'user',
                content: message
            });

            // Clear input and disable
            input.value = '';
            input.disabled = true;
            sendButton.disabled = true;

            // Show typing indicator
            const typingIndicator = document.getElementById('typingIndicator');
            typingIndicator.classList.add('active');

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: conversationHistory,
                        temperature: 0.7,
                        max_tokens: 2048
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'API request failed');
                }

                const data = await response.json();
                const aiMessage = data.choices[0].message.content;

                // Add AI response
                addMessage(aiMessage, 'assistant');
                conversationHistory.push({
                    role: 'assistant',
                    content: aiMessage
                });

            } catch (error) {
                addMessage(`Failed to get response: ${error.message}`, 'error');
                console.error('Error:', error);
            } finally {
                // Hide typing indicator
                typingIndicator.classList.remove('active');
                
                // Re-enable input
                input.disabled = false;
                sendButton.disabled = false;
                input.focus();
            }
        }
    </script>
</body>
</html>
