<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Terminal</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Marked.js -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- Highlight.js -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
body {
  background:#050505;
  color:#00ff9c;
  font-family:'JetBrains Mono', monospace;
}

.scanlines::after {
  content:"";
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(
    to bottom,
    rgba(0,255,156,0.03),
    rgba(0,255,156,0.03) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events:none;
}

.cursor::after {
  content:"_";
  animation:blink 1s infinite;
}

@keyframes blink {
  0%,50%,100% {opacity:1}
  25%,75% {opacity:0}
}

.panel {
  border:1px solid #1a1a1a;
}

button:hover {
  background:#00ff9c;
  color:#000;
}
</style>
</head>

<body class="scanlines">
<div class="p-4 max-w-5xl mx-auto">

<!-- Header -->
<div class="flex justify-between items-center mb-4">
  <div>GHOST_TERMINAL v1.0</div>
  <button id="purge" class="border px-2 py-1">PURGE_KEY</button>
</div>

<!-- Output -->
<div id="output" class="panel h-[60vh] overflow-y-auto p-3 mb-4 text-sm"></div>

<!-- Input -->
<textarea id="input" class="w-full panel p-2 h-24 resize-none" placeholder="Type your command..."></textarea>

<div class="flex justify-between mt-2">
  <div id="status">STATUS: IDLE</div>
  <button id="send" class="border px-4 py-1">SEND</button>
</div>

</div>

<script>
const output = document.getElementById('output');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusEl = document.getElementById('status');
const purgeBtn = document.getElementById('purge');

function getKey() {
  let key = localStorage.getItem('ghost_key');
  if (!key) {
    key = prompt('ENTER OPENROUTER API KEY');
    if (key) localStorage.setItem('ghost_key', key);
  }
  return key;
}

purgeBtn.onclick = () => {
  localStorage.removeItem('ghost_key');
  alert('KEY PURGED');
};

function appendMessage(role, content) {
  const div = document.createElement('div');
  div.className = 'mb-3';

  if (role === 'user') {
    div.textContent = '> ' + content;
  } else {
    div.innerHTML = marked.parse(content);
    div.querySelectorAll('pre code').forEach(block => {
      hljs.highlightElement(block);
    });
  }

  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  appendMessage('user', text);
  input.value = '';

  statusEl.textContent = 'STATUS: TUNNELING...';

  const key = getKey();

  try {
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + key,
        'Content-Type': 'application/json',
        'HTTP-Referer': window.location.origin
      },
      body: JSON.stringify({
        model: 'openrouter/auto',
        messages: [{ role: 'user', content: text }]
      })
    });

    if (!res.ok) {
      const err = await res.text();
      appendMessage('assistant', 'ERROR: ' + err);
      statusEl.textContent = 'STATUS: ERROR';
      return;
    }

    const data = await res.json();
    const reply = data.choices[0].message.content;

    appendMessage('assistant', reply);
    statusEl.textContent = 'STATUS: IDLE';

  } catch (e) {
    appendMessage('assistant', 'NETWORK FAILURE');
    statusEl.textContent = 'STATUS: ERROR';
  }
}

sendBtn.onclick = sendMessage;

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>

</body>
</html>
